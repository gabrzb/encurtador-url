server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: url-shortener
  security:
    user:
      name: ${API_BASIC_USERNAME:devuser}
      password: ${API_BASIC_PASSWORD:devpass123}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/url_shortener}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
app:
  base-url: ${APP_BASE_URL:http://localhost:8082}
  expiration-days: 30
  short-code-length: 6
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  rate-limit:
    create-url:
      max-requests: ${APP_CREATE_URL_RATE_LIMIT_MAX_REQUESTS:20}
      window-seconds: ${APP_CREATE_URL_RATE_LIMIT_WINDOW_SECONDS:60}