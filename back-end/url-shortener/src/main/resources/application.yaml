server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: url-shortener
  security:
    user:
      name: devuser
      password: devpass123
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/url_shortener}
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
app:
  base-url: ${APP_BASE_URL:http://localhost:8082}
  expiration-days: 30
  short-code-length: 6