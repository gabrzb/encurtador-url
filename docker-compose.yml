services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network

  backend:
    build:
      context: ./back-end/url-shortener
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SERVER_PORT: ${SERVER_PORT}
      DB_URL: jdbc:postgresql://db:5432/${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      API_BASIC_USERNAME: ${API_BASIC_USERNAME}
      API_BASIC_PASSWORD: ${API_BASIC_PASSWORD}
      APP_BASE_URL: ${APP_BASE_URL}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
      APP_CREATE_URL_RATE_LIMIT_MAX_REQUESTS: ${APP_CREATE_URL_RATE_LIMIT_MAX_REQUESTS}
      APP_CREATE_URL_RATE_LIMIT_WINDOW_SECONDS: ${APP_CREATE_URL_RATE_LIMIT_WINDOW_SECONDS}
    ports:
      - "${BACKEND_PORT}:${SERVER_PORT}"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:${SERVER_PORT}/api/urls > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks:
      - app-network

  frontend:
    build:
      context: ./front-end
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_DEFAULT_EXPIRATION_DAYS: ${VITE_DEFAULT_EXPIRATION_DAYS}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost/ > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
